groups:
- name: blackbox
  rules:
  - alert: BlackboxProbeFailed
    expr: avg_over_time(probe_success{job=~"bb_(icmp|tcp|http)"}[2m]) == 0
    for: 0m
    labels:
      severity: critical
    annotations:
      summary: "Blackbox probe failed ({{ $labels.job }} -> {{ $labels.instance }})"
      description: "Module={{ $labels.module }}; probe_success over last 2m is 0"
