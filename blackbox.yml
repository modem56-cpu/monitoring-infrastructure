modules:
  http_2xx:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1","HTTP/2"]
      preferred_ip_protocol: ip4
      tls_config:
        insecure_skip_verify: true
      fail_if_ssl: false
      fail_if_not_ssl: false

  http_2xx_selfsigned:
    prober: http
    timeout: 10s
    http:
      valid_status_codes: [200, 301, 302, 303]
      preferred_ip_protocol: ip4
      tls_config:
        insecure_skip_verify: true
      fail_if_ssl: false
      fail_if_not_ssl: false

  tcp_connect:
    prober: tcp
    timeout: 5s
    tcp:
      preferred_ip_protocol: ip4

  icmp:
    prober: icmp
    timeout: 3s
    icmp:
      preferred_ip_protocol: ip4
