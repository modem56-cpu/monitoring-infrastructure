global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default

  routes:
    - match:
        severity: critical
      receiver: default
      repeat_interval: 1h

receivers:
  - name: default
    webhook_configs:
      - url: 'http://prometheus:9090/api/v1/alerts'
        send_resolved: true

# To add email, uncomment and configure:
# global:
#   smtp_smarthost: 'smtp.gmail.com:587'
#   smtp_from: 'alerts@yourdomain.com'
#   smtp_auth_username: 'alerts@yourdomain.com'
#   smtp_auth_password: 'app-password-here'
#
# receivers:
#   - name: default
#     email_configs:
#       - to: 'admin@yourdomain.com'
#         send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'instance']
