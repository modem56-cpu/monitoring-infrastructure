global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'brian.monte@yokly.gives'
  smtp_auth_username: 'brian.monte@yokly.gives'
  smtp_auth_password: 'REPLACE_WITH_GMAIL_APP_PASSWORD'
  smtp_require_tls: true

route:
  group_by: ['alertname', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: email-brian

  routes:
    - match:
        severity: critical
      receiver: email-brian
      group_wait: 10s
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: email-brian
      repeat_interval: 4h

    - match:
        severity: info
      receiver: email-brian
      repeat_interval: 24h

receivers:
  - name: email-brian
    email_configs:
      - to: 'brian.monte@yokly.gives'
        send_resolved: true
        headers:
          subject: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }} — Yokly/Agapay Monitoring'
        html: |
          <h3>{{ .Status | toUpper }}: {{ .GroupLabels.alertname }}</h3>
          {{ range .Alerts }}
          <p>
            <strong>Alert:</strong> {{ .Labels.alertname }}<br>
            <strong>Severity:</strong> {{ .Labels.severity }}<br>
            <strong>Instance:</strong> {{ .Labels.instance }}<br>
            <strong>Summary:</strong> {{ .Annotations.summary }}<br>
            <strong>Started:</strong> {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}<br>
            {{ if .EndsAt }}<strong>Resolved:</strong> {{ .EndsAt.Format "2006-01-02 15:04:05 UTC" }}<br>{{ end }}
          </p>
          {{ end }}
          <p><a href="http://192.168.10.20:3000/d/security-ops-center">Open Security Operations Center</a></p>

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'instance']
